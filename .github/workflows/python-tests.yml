name: Run tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov setuptools wheel
          python setup.py install
      - name: Run pytest tests
        run: |
          pytest -v --cov=mgzip tests/
      - name: Test compression/decompression
        run: |
          python -c "
import mgzip
data = b'Hello, World! ' * 1000
compressed = mgzip.compress(data)
decompressed = mgzip.decompress(compressed)
assert decompressed == data, 'Compression/decompression failed'
print('✅ Basic compression test passed')
"
